<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE TRADE V6 - BTC/USDT</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: #000;
            border-bottom: 1px solid #1f222d;
            height: 40px;
        }
        #symbol {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        #price {
            font-size: 22px;
            font-weight: bold;
            color: #00ffcc;
            transition: color 0.2s;
        }
        #chart-container {
            width: 100vw;
            height: calc(100vh - 61px);
        }
    </style>
</head>
<body>

    <div id="header">
        <div id="symbol">BTC / USDT <span style="font-size: 12px; color: #888;">REAL-TIME</span></div>
        <div id="price">0.00</div>
    </div>

    <div id="chart-container"></div>

    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <script>
        const chartContainer = document.getElementById('chart-container');
        const priceDisplay = document.getElementById('price');
        let lastPrice = 0;

        // 1. Ініціалізація графіка з покращеними налаштуваннями
        const chart = LightweightCharts.createChart(chartContainer, {
            layout: {
                background: { type: 'solid', color: '#000000' },
                textColor: '#d1d4dc',
                fontSize: 12,
            },
            grid: {
                vertLines: { color: 'rgba(42, 46, 57, 0.2)' },
                horzLines: { color: 'rgba(42, 46, 57, 0.2)' },
            },
            rightPriceScale: {
                borderVisible: false,
                autoScale: true, // Це виправляє проблему горизонтальних ліній
            },
            timeScale: {
                borderVisible: false,
                timeVisible: true,
                secondsVisible: true,
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
                vertLine: { labelVisible: true },
                horzLine: { labelVisible: true },
            },
            handleScale: {
                mouseWheel: true,
                pinch: true,
            }
        });

        // 2. Створення лінійної серії (виправлений синтаксис v4)
        const lineSeries = chart.addSeries(LightweightCharts.LineSeries, {
            color: '#00ffcc',
            lineWidth: 2,
            priceLineVisible: true,
            lastValueVisible: true,
            priceFormat: {
                type: 'price',
                precision: 2,
                minMove: 0.01,
            },
        });

        // Адаптація під розмір вікна
        window.addEventListener('resize', () => {
            chart.applyOptions({ 
                width: chartContainer.clientWidth, 
                height: chartContainer.clientHeight 
            });
        });

        // 3. Робота з даними через WebSocket
        const socket = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@kline_1m');

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const kline = data.k;
            
            const price = parseFloat(kline.c);
            const time = Math.floor(kline.t / 1000);

            // Оновлення графіка
            lineSeries.update({
                time: time,
                value: price
            });

            // Оновлення відображення ціни з індикацією напрямку (зелений/червоний)
            if (price > lastPrice) {
                priceDisplay.style.color = '#00ffcc';
            } else if (price < lastPrice) {
                priceDisplay.style.color = '#ff4444';
            }
            
            priceDisplay.innerText = price.toLocaleString('en-US', { minimumFractionDigits: 2 });
            lastPrice = price;
        };

        socket.onerror = (error) => {
            console.error('WebSocket Error:', error);
        };

        socket.onclose = () => {
            console.log('З’єднання розірвано. Спробуйте оновити сторінку.');
        };
    </script>
</body>
</html>
