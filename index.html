<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Lite Pro</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body {
            background-color: #0c0d10;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        #price-display {
            font-size: 48px;
            font-weight: bold;
            color: #26a69a;
            margin: 10px 0;
        }
        .pair-name {
            font-size: 18px;
            color: #d1d4dc;
        }
        #chart-container {
            width: 100%;
            max-width: 800px;
            height: 400px;
            border: 1px solid #1f222d;
            border-radius: 8px;
            overflow: hidden;
        }
        .status {
            margin-top: 10px;
            font-size: 12px;
            color: #787b86;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="pair-name">AUD / USD</div>
        <div id="price-display">0.0000</div>
        <div id="connection-status" class="status">Підключення до біржі...</div>
    </div>

    <div id="chart-container"></div>

    <script>
        const container = document.getElementById('chart-container');
        const priceDisplay = document.getElementById('price-display');
        const statusDisplay = document.getElementById('connection-status');

        // 1. Створення графіка
        const chart = LightweightCharts.createChart(container, {
            layout: {
                background: { color: '#0c0d10' },
                textColor: '#d1d4dc',
            },
            grid: {
                vertLines: { color: '#1f222d' },
                horzLines: { color: '#1f222d' },
            },
            timeScale: {
                timeVisible: true,
                secondsVisible: false,
            },
        });

        // 2. Додавання лінії ціни
        const lineSeries = chart.addLineSeries({
            color: '#26a69a',
            lineWidth: 2,
        });

        // Підлаштовуємо графік під розмір екрану
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: container.clientWidth });
        });

        // 3. Підключення до Binance WebSocket (AUD/USD)
        // Використовуємо wss:// для безпечного з'єднання
        const symbol = 'audusdt';
        const socket = new WebSocket(`wss://stream.binance.com:9443/ws/${symbol}@ticker`);

        socket.onopen = () => {
            statusDisplay.innerText = 'З’єднано з Binance (Live)';
            statusDisplay.style.color = '#26a69a';
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const price = parseFloat(data.c).toFixed(4); // Поточна ціна

            // Оновлюємо цифру на екрані
            priceDisplay.innerText = price;

            // Додаємо точку на графік
            lineSeries.update({
                time: Math.floor(Date.now() / 1000),
                value: parseFloat(price),
            });
        };

        socket.onerror = (error) => {
            statusDisplay.innerText = 'Помилка підключення';
            statusDisplay.style.color = '#ef5350';
        };

        socket.onclose = () => {
            statusDisplay.innerText = 'З’єднання розірвано';
        };
    </script>
</body>
</html>
