<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUD/USDT Live Trade</title>
    <style>
        body { margin: 0; background-color: #0c0d10; color: white; font-family: sans-serif; overflow: hidden; }
        #header { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; height: 50px; background: #161a1e; border-bottom: 1px solid #2b2f36; }
        #price { font-size: 26px; font-weight: bold; font-variant-numeric: tabular-nums; color: #2ebd85; }
        #chart-container { width: 100vw; height: calc(100vh - 51px); }
    </style>
</head>
<body>

    <div id="header">
        <div style="font-weight: bold;">AUD / USDT <span style="color: #848e9c; font-size: 12px; margin-left: 10px;">LIVE</span></div>
        <div id="price">Очікування даних...</div>
    </div>

    <div id="chart-container"></div>

    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <script>
        const chartContainer = document.getElementById('chart-container');
        const priceDisplay = document.getElementById('price');
        let lastPrice = 0;

        // 1. Створення графіка
        const chart = LightweightCharts.createChart(chartContainer, {
            layout: { background: { color: '#0c0d10' }, textColor: '#707a8a' },
            grid: { vertLines: { visible: false }, horzLines: { color: 'rgba(43, 47, 54, 0.2)' } },
            rightPriceScale: { borderVisible: false },
            timeScale: { borderVisible: false, timeVisible: true, secondsVisible: true },
        });

        // ВИПРАВЛЕНА ПОМИЛКА: використовуємо правильний метод addAreaSeries
        const series = chart.addAreaSeries({
            lineColor: '#2ebd85',
            topColor: 'rgba(46, 189, 133, 0.2)',
            bottomColor: 'rgba(46, 189, 133, 0.0)',
            lineWidth: 2,
            priceFormat: { type: 'price', precision: 4, minMove: 0.0001 },
        });

        // 2. Підключення до Binance
        const socket = new WebSocket('wss://stream.binance.com:9443/ws/audusdt@trade');

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            const price = parseFloat(data.p);
            const time = Math.floor(data.T / 1000);

            // Оновлення ціни в шапці
            if (price !== lastPrice) {
                priceDisplay.innerText = price.toFixed(4);
                priceDisplay.style.color = price >= lastPrice ? '#2ebd85' : '#f6465d';
                lastPrice = price;
            }

            // Оновлення графіка
            series.update({
                time: time,
                value: price
            });
        };

        // Адаптація розміру при зміні вікна
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: chartContainer.clientWidth, height: chartContainer.clientHeight });
        });
    </script>
</body>
</html>
