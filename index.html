<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>LIVE TRADE V6</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        html, body { height: 100%; margin: 0; background-color: #0c0d10; color: white; font-family: sans-serif; overflow: hidden; }
        #header { height: 60px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; background: #141823; border-bottom: 1px solid #363c4e; }
        #price { font-size: 32px; font-weight: bold; color: #26a69a; min-width: 150px; text-align: right; }
        #chart { width: 100vw; height: calc(100vh - 60px); }
    </style>
</head>
<body>
    <div id="header">
        <span style="font-size: 20px;">BTC / USDT (Real-Time)</span>
        <div id="price">0.00</div>
    </div>
    <div id="chart"></div>

    <script>
        const container = document.getElementById('chart');
        const chart = LightweightCharts.createChart(container, {
            layout: { background: { color: '#0c0d10' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#1f222d' }, horzLines: { color: '#1f222d' } },
            timeScale: { timeVisible: true, secondsVisible: true },
        });

        const lineSeries = chart.addLineSeries({ 
            color: '#26a69a', 
            lineWidth: 3,
            priceFormat: { type: 'price', precision: 2, minMove: 0.01 }
        });

        let lastPrice = 0;

        async function getPrice() {
            try {
                // Використовуємо api1, api2 або api3 для обходу блокувань + мітку часу для свіжості даних
                const servers = ['api.binance.com', 'api1.binance.com', 'api2.binance.com', 'api3.binance.com'];
                const randomServer = servers[Math.floor(Math.random() * servers.length)];
                
                const response = await fetch(`https://${randomServer}/api/v3/ticker/price?symbol=BTCUSDT&_t=${Date.now()}`);
                const data = await response.json();
                const price = parseFloat(data.price);

                if (price !== lastPrice) {
                    const priceEl = document.getElementById('price');
                    priceEl.innerText = price.toFixed(2);
                    
                    // Анімація кольору (блимання при зміні)
                    priceEl.style.color = price >= lastPrice ? '#26a69a' : '#ef5350';
                    
                    lineSeries.update({
                        time: Math.floor(Date.now() / 1000),
                        value: price
                    });
                    lastPrice = price;
                }
            } catch (err) {
                console.log("Пошук сигналу...");
            }
        }

        // Запитуємо ціну кожну секунду (1000 мс)
        setInterval(getPrice, 1000);
        getPrice();

        window.onresize = () => {
            chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
        };
    </script>
</body>
</html>
