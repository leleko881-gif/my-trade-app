<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO TRADE LIVE - BTC/USDT</title>
    <style>
        body { margin: 0; background-color: #0c0d10; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        #header { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; height: 50px; background: #161a1e; border-bottom: 1px solid #2b2f36; }
        #symbol-info { display: flex; align-items: center; gap: 10px; }
        #price { font-size: 26px; font-weight: 600; font-variant-numeric: tabular-nums; }
        #chart-container { width: 100vw; height: calc(100vh - 51px); }
        .label { color: #848e9c; font-size: 14px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="header">
        <div id="symbol-info">
            <span style="font-weight: bold; font-size: 18px;">BTC/USDT</span>
            <span class="label">Live Stream</span>
        </div>
        <div id="price">0.00</div>
    </div>

    <div id="chart-container"></div>

    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <script>
        const chartContainer = document.getElementById('chart-container');
        const priceDisplay = document.getElementById('price');
        let lastPrice = 0;

        // 1. Налаштування професійного вигляду графіка
        const chart = LightweightCharts.createChart(chartContainer, {
            layout: {
                background: { color: '#0c0d10' },
                textColor: '#707a8a',
                fontSize: 12,
            },
            grid: {
                vertLines: { color: 'rgba(43, 47, 54, 0.5)' },
                horzLines: { color: 'rgba(43, 47, 54, 0.5)' },
            },
            rightPriceScale: {
                borderVisible: false,
                autoScale: true,
                scaleMargins: { top: 0.2, bottom: 0.2 },
            },
            timeScale: {
                borderVisible: false,
                timeVisible: true,
                secondsVisible: true,
            },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            handleScroll: true,
            handleScale: true,
        });

        // 2. Додаємо область із градієнтом (Area Series)
        const series = chart.addSeries(LightweightCharts.AreaSeries, {
            lineColor: '#2ebd85', // Зелений колір Binance
            topColor: 'rgba(46, 189, 133, 0.3)',
            bottomColor: 'rgba(46, 189, 133, 0.0)',
            lineWidth: 2,
            priceLineVisible: true,
            lastValueVisible: true,
        });

        // 3. Підключення до потоку угод (Trade Stream)
        const socket = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const price = parseFloat(data.p);
            const time = Math.floor(data.T / 1000); // Час угоди в секундах

            // Оновлення графіка
            series.update({
                time: time,
                value: price
            });

            // Оновлення великих цифр зверху
            if (price !== lastPrice) {
                priceDisplay.innerText = price.toFixed(2);
                priceDisplay.style.color = price >= lastPrice ? '#2ebd85' : '#f6465d';
                lastPrice = price;
            }
        };

        // Адаптація під розмір екрану
        window.addEventListener('resize', () => {
            chart.applyOptions({ 
                width: chartContainer.clientWidth, 
                height: chartContainer.clientHeight 
            });
        });

        // Авто-масштабування при першому завантаженні
        setTimeout(() => chart.timeScale().fitContent(), 2000);
    </script>
</body>
</html>
