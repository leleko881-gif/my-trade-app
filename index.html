<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Trade Pro V3 FINAL</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0c0d10; color: white; margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #header { padding: 15px; display: flex; justify-content: space-between; background: #141823; border-bottom: 1px solid #363c4e; }
        #price { font-size: 24px; font-weight: bold; color: #26a69a; }
        #chart { flex-grow: 1; width: 100%; }
    </style>
</head>
<body>
    <div id="header">
        <span>AUD / USD (Binance Live)</span>
        <div id="price">Чекаємо дані...</div>
    </div>
    <div id="chart"></div>

    <script>
        // 1. Створюємо графік всередині блоку "chart"
        const chartElement = document.getElementById('chart');
        const chart = LightweightCharts.createChart(chartElement, {
            layout: { background: { color: '#0c0d10' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#1f222d' }, horzLines: { color: '#1f222d' } },
            timeScale: { timeVisible: true, secondsVisible: true },
        });

        // 2. Обов'язково створюємо lineSeries ПЕРЕД підключенням до Binance
        const lineSeries = chart.addLineSeries({ 
            color: '#26a69a', 
            lineWidth: 2,
            priceFormat: { type: 'price', precision: 4, minMove: 0.0001 }
        });

        let lastPrice = 0;

        // 3. Тільки тепер відкриваємо з'єднання
        const socket = new WebSocket('wss://stream.binance.com:9443/ws/audusdt@ticker');
        
        socket.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                const price = parseFloat(data.c);
                const priceEl = document.getElementById('price');
                
                if (priceEl) {
                    priceEl.innerText = price.toFixed(4);
                    priceEl.style.color = price >= lastPrice ? '#26a69a' : '#ef5350';
                }

                // Передаємо дані на графік
                lineSeries.update({
                    time: Math.floor(data.E / 1000),
                    value: price
                });
                
                lastPrice = price;
            } catch (e) {
                console.error("Помилка при отриманні даних:", e);
            }
        };

        window.onresize = () => {
            chart.applyOptions({ 
                width: chartElement.clientWidth, 
                height: chartElement.clientHeight 
            });
        };
    </script>
</body>
</html>
