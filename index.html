<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOREX LIVE - AUD/USD</title>
    <style>
        body { margin: 0; background-color: #0c0d10; color: white; font-family: sans-serif; overflow: hidden; }
        #header { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; height: 50px; background: #161a1e; border-bottom: 1px solid #2b2f36; }
        #price { font-size: 26px; font-weight: bold; font-variant-numeric: tabular-nums; color: #2ebd85; }
        #chart-container { width: 100vw; height: calc(100vh - 51px); }
    </style>
</head>
<body>

    <div id="header">
        <div style="font-weight: bold;">AUD / USD <span style="color: #848e9c; font-size: 12px; margin-left: 10px;">FOREX LIVE</span></div>
        <div id="price">0.00000</div>
    </div>

    <div id="chart-container"></div>

    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <script>
        const chartContainer = document.getElementById('chart-container');
        const priceDisplay = document.getElementById('price');
        
        let lastPrice = 0;
        let nextUpdateAllowed = 0;
        const UPDATE_INTERVAL = 200; 

        // 1. Ініціалізація графіка
        const chart = LightweightCharts.createChart(chartContainer, {
            layout: { background: { color: '#0c0d10' }, textColor: '#707a8a' },
            grid: { vertLines: { visible: false }, horzLines: { color: 'rgba(43, 47, 54, 0.3)' } },
            rightPriceScale: { 
                autoScale: true, 
                borderVisible: false,
                // Налаштування для валют (більше знаків)
                localization: {
                    priceFormatter: price => price.toFixed(5),
                },
            },
            timeScale: { borderVisible: false, timeVisible: true, secondsVisible: true },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal }
        });

        const series = chart.addSeries(LightweightCharts.AreaSeries, {
            lineColor: '#2ebd85',
            topColor: 'rgba(46, 189, 133, 0.2)',
            bottomColor: 'rgba(46, 189, 133, 0.0)',
            lineWidth: 2,
            // Вказуємо точність 5 знаків для валютної пари
            priceFormat: {
                type: 'price',
                precision: 5,
                minMove: 0.00001,
            },
        });

        // 2. WebSocket для AUD/USD на Binance
        // Важливо: на Binance валютні пари пишуться як audusd
        const socket = new WebSocket('wss://stream.binance.com:9443/ws/audusd@trade');

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const price = parseFloat(data.p);
            const time = Math.floor(data.T / 1000);
            const now = Date.now();

            if (price !== lastPrice) {
                // Відображаємо 5 знаків після коми
                priceDisplay.innerText = price.toFixed(5);
                priceDisplay.style.color = price >= lastPrice ? '#2ebd85' : '#f6465d';
                lastPrice = price;
            }

            if (now > nextUpdateAllowed) {
                series.update({
                    time: time,
                    value: price
                });
                nextUpdateAllowed = now + UPDATE_INTERVAL;
            }
        };

        window.addEventListener('resize', () => {
            chart.applyOptions({ width: chartContainer.clientWidth, height: chartContainer.clientHeight });
        });

        setTimeout(() => chart.timeScale().fitContent(), 1000);
    </script>
</body>
</html>
