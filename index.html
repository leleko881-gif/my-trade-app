<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE TRADE V6 - BTC/USDT</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }
        #header {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: #000;
            z-index: 10;
        }
        #price {
            font-size: 24px;
            font-weight: bold;
            color: #00ffcc;
        }
        #chart-container {
            width: 100vw;
            height: calc(100vh - 60px);
        }
    </style>
</head>
<body>

    <div id="header">
        <div>BTC / USDT (Real-Time)</div>
        <div id="price">0.00</div>
    </div>

    <div id="chart-container"></div>

    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <script>
        const chartContainer = document.getElementById('chart-container');
        const priceDisplay = document.getElementById('price');

        // 1. Створення графіка
        const chart = LightweightCharts.createChart(chartContainer, {
            layout: {
                backgroundColor: '#000000',
                textColor: '#d1d4dc',
            },
            grid: {
                vertLines: { color: '#1f222d' },
                horzLines: { color: '#1f222d' },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
            },
            timeScale: {
                timeVisible: true,
                secondsVisible: false,
            },
        });

        // 2. ВИПРАВЛЕНА ПОМИЛКА: Використовуємо addSeries замість addLineSeries
        const lineSeries = chart.addSeries(LightweightCharts.LineSeries, {
            color: '#00ffcc',
            lineWidth: 2,
        });

        // Підлаштування розміру під вікно
        window.addEventListener('resize', () => {
            chart.applyOptions({ 
                width: chartContainer.clientWidth, 
                height: chartContainer.clientHeight 
            });
        });

        // 3. Отримання даних у реальному часі через Binance WebSocket
        const socket = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@kline_1m');

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const kline = data.k;
            
            const price = parseFloat(kline.c); // Поточна ціна закриття
            const time = kline.t / 1000;      // Час у секундах

            // Оновлюємо графік
            lineSeries.update({
                time: time,
                value: price
            });

            // Оновлюємо цифру ціни зверху
            priceDisplay.innerText = price.toFixed(2);
            priceDisplay.style.color = price >= parseFloat(priceDisplay.innerText) ? '#00ffcc' : '#ff4444';
        };

        socket.onerror = (error) => {
            console.error('WebSocket Error:', error);
        };
    </script>
</body>
</html>
