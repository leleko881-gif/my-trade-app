<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>BTC LIVE - AntiBlock Version</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background-color: #0c0d10; color: white; font-family: sans-serif; overflow: hidden; }
        #header { height: 60px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; background: #141823; border-bottom: 1px solid #363c4e; }
        #price { font-size: 26px; font-weight: bold; color: #f7931a; }
        #chart { width: 100vw; height: calc(100vh - 60px); }
    </style>
</head>
<body>
    <div id="header">
        <span>BTC / USDT (Polling Mode)</span>
        <div id="price">Завантаження...</div>
    </div>
    <div id="chart"></div>

    <script>
        window.addEventListener('load', () => {
            const container = document.getElementById('chart');
            const chart = LightweightCharts.createChart(container, {
                layout: { background: { color: '#0c0d10' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#1f222d' }, horzLines: { color: '#1f222d' } },
                timeScale: { timeVisible: true, secondsVisible: true },
            });

            const lineSeries = chart.addLineSeries({ 
                color: '#f7931a', 
                lineWidth: 2,
                priceFormat: { type: 'price', precision: 2, minMove: 0.01 }
            });

            let lastPrice = 0;

            // ФУНКЦІЯ ОТРИМАННЯ ЦІНИ (БЕЗ WEBSOCKET)
            async function fetchPrice() {
                try {
                    const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                    const data = await response.json();
                    const price = parseFloat(data.price);
                    
                    const priceEl = document.getElementById('price');
                    priceEl.innerText = price.toLocaleString() + " $";
                    priceEl.style.color = price >= lastPrice ? '#26a69a' : '#ef5350';
                    
                    lineSeries.update({
                        time: Math.floor(Date.now() / 1000),
                        value: price
                    });
                    
                    lastPrice = price;
                } catch (err) {
                    console.error("Помилка запиту:", err);
                }
            }

            // Опитуємо сервер кожні 2 секунди
            setInterval(fetchPrice, 2000);
            fetchPrice();

            window.addEventListener('resize', () => {
                chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
            });
        });
    </script>
</body>
</html>
