<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE TRADE V6 - BTC/USDT</title>
    <style>
        body { margin: 0; background-color: #131722; color: white; font-family: sans-serif; overflow: hidden; }
        #header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; height: 45px; border-bottom: 1px solid #2a2e39; background: #131722; }
        #price { font-size: 24px; font-weight: bold; }
        #chart-container { width: 100vw; height: calc(100vh - 66px); }
    </style>
</head>
<body>

    <div id="header">
        <div style="font-weight: bold; color: #d1d4dc;">BTC / USDT <span style="color: #00ffcc; font-size: 12px;">LIVE</span></div>
        <div id="price">Завантаження...</div>
    </div>

    <div id="chart-container"></div>

    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <script>
        const chartContainer = document.getElementById('chart-container');
        const priceDisplay = document.getElementById('price');
        let lastPrice = 0;

        // 1. Створення графіка
        const chart = LightweightCharts.createChart(chartContainer, {
            layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
            grid: {
                vertLines: { color: '#2a2e39' },
                horzLines: { color: '#2a2e39' },
            },
            rightPriceScale: {
                autoScale: true,
                borderVisible: false,
            },
            timeScale: {
                borderVisible: false,
                timeVisible: true,
                secondsVisible: true,
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
            },
        });

        // 2. Створення серії (Area для гарного вигляду)
        const areaSeries = chart.addSeries(LightweightCharts.AreaSeries, {
            lineColor: '#00ffcc',
            topColor: 'rgba(0, 255, 204, 0.4)',
            bottomColor: 'rgba(0, 255, 204, 0.05)',
            lineWidth: 2,
        });

        // 3. WebSocket Binance
        const socket = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const price = parseFloat(data.p); // 'p' - це ціна в потоці @trade
            
            // ВИПРАВЛЕННЯ ЧАСУ: використовуємо поточний час у секундах
            // Це гарантує, що кожна нова ціна малює нову точку на графіку
            const currentTime = Math.floor(Date.now() / 1000);

            areaSeries.update({
                time: currentTime,
                value: price
            });

            // Оновлення тексту ціни
            priceDisplay.innerText = price.toFixed(2);
            
            if (price > lastPrice) {
                priceDisplay.style.color = '#00ffcc';
            } else if (price < lastPrice) {
                priceDisplay.style.color = '#f23645';
            }
            
            lastPrice = price;
        };

        // Адаптивність при зміні розміру вікна
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: chartContainer.clientWidth, height: chartContainer.clientHeight });
        });

        // Авто-фокус на нових даних при старті
        chart.timeScale().fitContent();
    </script>
</body>
</html>
