<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Lite Pro</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0c0d10; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 15px; background: #141823; border-bottom: 1px solid #363c4e; display: flex; justify-content: space-between; align-items: center; }
        #price { font-size: 28px; font-weight: bold; color: #26a69a; }
        #chart-container { flex-grow: 1; width: 100%; height: 100%; }
        #status { font-size: 10px; color: #848e9c; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1 style="margin:0; font-size:16px; color:#848e9c;">AUD / USD</h1>
            <div id="status">З'єднання з Binance...</div>
        </div>
        <div id="price">0.0000</div>
    </div>
    <div id="chart-container"></div>

    <script>
        const container = document.getElementById('chart-container');
        
        const chart = LightweightCharts.createChart(container, {
            layout: { background: { color: '#0c0d10' }, textColor: '#848e9c' },
            grid: { vertLines: { color: '#1f222d' }, horzLines: { color: '#1f222d' } },
            timeScale: { timeVisible: true, secondsVisible: true }
        });

        const lineSeries = chart.addLineSeries({ 
            color: '#26a69a', 
            lineWidth: 2,
            priceFormat: { type: 'price', precision: 4, minMove: 0.0001 }
        });

        const resize = () => {
            chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
        };
        window.addEventListener('resize', resize);
        resize();

        let lastPrice = 0;
        const socket = new WebSocket('wss://stream.binance.com:9443/ws/audusdt@ticker');

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const currentPrice = parseFloat(data.c);
            const priceEl = document.getElementById('price');

            priceEl.innerText = currentPrice.toFixed(4);
            priceEl.style.color = currentPrice >= lastPrice ? '#26a69a' : '#ef5350';

            lineSeries.update({
                time: Math.floor(data.E / 1000),
                value: currentPrice
            });

            lastPrice = currentPrice;
            document.getElementById('status').innerText = 'У мережі';
        };

        socket.onerror = () => { document.getElementById('status').innerText = 'Помилка мережі'; };
    </script>
</body>
</html>
