<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Trade Live FINAL</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        html, body { height: 100%; margin: 0; background-color: #0c0d10; color: white; font-family: sans-serif; overflow: hidden; }
        #header { height: 60px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; background: #141823; border-bottom: 1px solid #363c4e; }
        #price { font-size: 28px; font-weight: bold; color: #26a69a; }
        #chart { width: 100vw; height: calc(100vh - 60px); }
    </style>
</head>
<body>
    <div id="header">
        <span>BTC / USDT (Live Bridge)</span>
        <div id="price">Оновлення...</div>
    </div>
    <div id="chart"></div>

    <script>
        window.addEventListener('load', () => {
            const container = document.getElementById('chart');
            const chart = LightweightCharts.createChart(container, {
                layout: { background: { color: '#0c0d10' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#1f222d' }, horzLines: { color: '#1f222d' } },
                timeScale: { timeVisible: true, secondsVisible: true },
            });

            const lineSeries = chart.addLineSeries({ color: '#26a69a', lineWidth: 3 });

            let lastPrice = 0;

            async function updatePrice() {
                try {
                    // Використовуємо випадкове число в кінці посилання (?t=...), щоб браузер не міг підсунути старі дані
                    const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT&t=' + Date.now());
                    const data = await response.json();
                    const price = parseFloat(data.price);
                    
                    if (price !== lastPrice) {
                        const priceEl = document.getElementById('price');
                        priceEl.innerText = price.toFixed(2) + " $";
                        
                        // Зміна кольору при русі
                        priceEl.style.color = price >= lastPrice ? '#26a69a' : '#ef5350';

                        lineSeries.update({
                            time: Math.floor(Date.now() / 1000),
                            value: price
                        });
                        lastPrice = price;
                    }
                } catch (e) {
                    console.log("Спроба підключення...");
                }
            }

            // Робимо запит частіше - кожну секунду
            setInterval(updatePrice, 1000);
            updatePrice();

            window.onresize = () => {
                chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
            };
        });
    </script>
</body>
</html>
